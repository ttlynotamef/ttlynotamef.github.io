<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>-ar27</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #1a1a20;
      --border: #2d2d35;
      --text: #e8e6e3;
      --muted: #888;
      --accent: #6b8cff;
      --accent-dim: #4a6ad4;
      --long-dash: #c9b896;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', 'Plus Jakarta Sans', sans-serif;
      font-weight: 500;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      padding: 2rem 1rem;
      line-height: 1.5;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      letter-spacing: 0.02em;
    }
    .sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font: inherit;
      resize: vertical;
      margin-bottom: 1rem;
    }
    textarea::placeholder { color: var(--muted); }
    .btns {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    button {
      padding: 0.6rem 1.2rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font: inherit;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { background: var(--accent-dim); }
    button.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.secondary:hover { border-color: var(--accent); color: var(--accent); }
    .out {
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .out.empty { color: var(--muted); }
    footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    body.easter-pop {
      background: var(--bg) url("https://static.wikia.nocookie.net/project-sekai/images/8/8b/What%27s_up%3F_Pop%21_Game_Cover.png/revision/latest?cb=20240403130414&path-prefix=ru") no-repeat center center fixed;
      background-size: cover;
    }
    body.easter-pop::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(15, 15, 18, 0.75);
      pointer-events: none;
      z-index: 0;
    }
    body.easter-pop .wrap { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>-ar27</h1>

    <div class="block encode">
      <label>кодировать тут</label>
      <textarea id="plain" placeholder="Введите фразу для кодирования..."></textarea>
      <div class="btns">
        <button type="button" id="btnEncode">Закодировать</button>
      </div>
    </div>

    <div class="block decode" style="margin-top: 2rem;">
      <label>uncodirovat</label>
      <textarea id="cipher" placeholder="—b.27xxx—j.9022yyy (без пробелов)"></textarea>
      <div class="btns">
        <button type="button" id="btnDecode">Расшифровать</button>
      </div>
      <div id="decodedOut" class="out empty">Расшифрованный текст появится здесь</div>
    </div>

    <footer>(super/cmd) ctrl+s -> созранить полностью html страницу и открыть её в браузере ОФФЛАЙН БЕЗПЛАТНА БЕЗ РЕГИСТРАЦИИ БЕЗ СЕРВИСОВ БЕЗ ВСЕГО (кроме моиз сладеньких пояток)</footer>
  </div>
